<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sa="http://sa-token.dev33.cn" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('小说管理')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="book-form">
                    <div class="select-list">
                        <ul>
                            <li>
                                小说名称：<input type="text" name="name"/>
                            </li>
                            <li>
                                作者：<input type="text" name="author"/>
                            </li>
                            <li>
                                状态：<select name="status" th:with="type=${@dict.getType('book_status')}">
                                    <option value="">所有</option>
                                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                                </select>
                            </li>
                            <li class="select-time">
                                <label>创建时间： </label>
                                <input type="text" class="time-input" id="startTime" placeholder="开始时间" name="params[beginTime]"/>
                                <span>-</span>
                                <input type="text" class="time-input" id="endTime" placeholder="结束时间" name="params[endTime]"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" sa:permission="content:book:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" sa:permission="content:book:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" sa:permission="content:book:remove">
                    <i class="fa fa-trash"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" sa:permission="content:book:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('content:book:edit')}]];
        var removeFlag = [[${@permission.hasPermi('content:book:remove')}]];
        var statusDatas = [[${@dict.getType('book_status')}]];
        var onlineStatusDatas = [[${@dict.getType('book_online_status')}]];
        var prefix = ctx + "content/book";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                sortName: "id",
                sortOrder: "desc",
                modalName: "小说",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '小说ID'
                },
                {
                    field: 'cover',
                    title: '封面',
                    align: 'center',
                    formatter: function(value, row, index) {
                        if (value) {
                            return '<img src="' + value + '" width="60" height="80"/>';
                        }
                        return '-';
                    }
                },
                {
                    field: 'name',
                    title: '小说名称',
                    formatter: function(value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'author',
                    title: '作者'
                },
                {
                    field: 'categoryName',
                    title: '分类',
                    formatter: function(value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    field: 'status',
                    title: '状态',
                    align: 'center',
                    formatter: function(value, row, index) {
                        return $.table.selectDictLabel(statusDatas, value);
                    }
                },
                {
                    field: 'onlineStatus',
                    title: '上架状态',
                    align: 'center',
                    formatter: function(value, row, index) {
                        return $.table.selectDictLabel(onlineStatusDatas, value);
                    }
                },
                {
                    field: 'totalWords',
                    title: '总字数',
                    formatter: function(value, row, index) {
                        if (value) {
                            return (value / 10000).toFixed(2) + '万';
                        }
                        return '0';
                    }
                },
                {
                    field: 'totalChapters',
                    title: '章节数'
                },
                {
                    field: 'totalViews',
                    title: '阅读量'
                },
                {
                    field: 'createTime',
                    title: '创建时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-trash"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
