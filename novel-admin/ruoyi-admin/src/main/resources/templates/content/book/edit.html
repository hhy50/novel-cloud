<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改小说')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-book-edit" th:object="${bookInfo}">
            <input id="id" name="id" th:field="*{id}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">小说名称：</label>
                <div class="col-sm-8">
                    <input id="name" name="name" th:field="*{name}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">作者：</label>
                <div class="col-sm-8">
                    <input id="author" name="author" th:field="*{author}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">语言：</label>
                <div class="col-sm-8">
                    <input id="language" name="language" th:field="*{language}" class="form-control" type="text" placeholder="zh-CN">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">封面：</label>
                <div class="col-sm-8">
                    <input id="cover" name="cover" th:field="*{cover}" class="form-control" type="text" placeholder="请输入封面图片URL">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">作品简介：</label>
                <div class="col-sm-8">
                    <textarea id="description" name="description" class="form-control" rows="4" maxlength="2000">[[*{description}]]</textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">总定价（分）：</label>
                <div class="col-sm-8">
                    <input id="totalPrice" name="totalPrice" th:field="*{totalPrice}" class="form-control" type="number" min="0" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">千字定价（分）：</label>
                <div class="col-sm-8">
                    <input id="wordsPrice" name="wordsPrice" th:field="*{wordsPrice}" class="form-control" type="number" min="0" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">章节定价（分）：</label>
                <div class="col-sm-8">
                    <input id="chapterPrice" name="chapterPrice" th:field="*{chapterPrice}" class="form-control" type="number" min="0" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">免费章节数：</label>
                <div class="col-sm-8">
                    <input id="freeChapters" name="freeChapters" th:field="*{freeChapters}" class="form-control" type="number" min="0" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <select id="status" name="status" class="form-control m-b" th:with="type=${@dict.getType('book_status')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:selected="${dict.dictValue == bookInfo.status}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">上架状态：</label>
                <div class="col-sm-8">
                    <select id="onlineStatus" name="onlineStatus" class="form-control m-b" th:with="type=${@dict.getType('book_online_status')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:selected="${dict.dictValue == bookInfo.onlineStatus}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">标签：</label>
                <div class="col-sm-8">
                    <label class="checkbox-inline">
                        <input type="checkbox" name="isBaoyue" value="1" th:checked="${bookInfo.isBaoyue == 1}"> 会员作品
                    </label>
                    <label class="checkbox-inline">
                        <input type="checkbox" name="isHot" value="1" th:checked="${bookInfo.isHot == 1}"> 热门
                    </label>
                    <label class="checkbox-inline">
                        <input type="checkbox" name="isNew" value="1" th:checked="${bookInfo.isNew == 1}"> 新品
                    </label>
                    <label class="checkbox-inline">
                        <input type="checkbox" name="isLimitedFree" value="1" th:checked="${bookInfo.isLimitedFree == 1}"> 限时免费
                    </label>
                    <label class="checkbox-inline">
                        <input type="checkbox" name="isGreatest" value="1" th:checked="${bookInfo.isGreatest == 1}"> 精选
                    </label>
                    <label class="checkbox-inline">
                        <input type="checkbox" name="isGod" value="1" th:checked="${bookInfo.isGod == 1}"> 大神作品
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">总字数：</label>
                <div class="col-sm-8">
                    <input id="totalWords" name="totalWords" th:field="*{totalWords}" class="form-control" type="number" min="0" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">章节数：</label>
                <div class="col-sm-8">
                    <input id="totalChapters" name="totalChapters" th:field="*{totalChapters}" class="form-control" type="number" min="0" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">评分：</label>
                <div class="col-sm-8">
                    <input id="score" name="score" th:field="*{score}" class="form-control" type="number" min="0" max="100" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea id="remark" name="remark" class="form-control">[[*{remark}]]</textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "content/book";

        $("#form-book-edit").validate({
            onkeyup: false,
            rules: {
                name: {
                    remote: {
                        url: prefix + "/checkBookNameUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "id": function() {
                                return $("#id").val();
                            },
                            "name": function() {
                                return $.common.trim($("#name").val());
                            }
                        }
                    }
                },
            },
            messages: {
                "name": {
                    remote: "小说名称已经存在"
                }
            },
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-book-edit').serialize());
            }
        }
    </script>
</body>
</html>
